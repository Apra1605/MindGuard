<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Chat</title>
    <style>
      :root {
        --skin: #e7b79b;
        --panel: rgba(255, 248, 242, 0.9);
        --line: rgba(92, 63, 48, 0.16);
        --text: #4a372d;
        --muted: #85685a;
        --accent: #8f5e4d;
        --accent-deep: #6f493c;
        --shadow: 0 22px 40px rgba(78, 47, 31, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(255, 239, 230, 0.45), transparent 28%),
          radial-gradient(circle at bottom right, rgba(198, 224, 216, 0.28), transparent 24%),
          linear-gradient(180deg, #efc9b2 0%, var(--skin) 100%);
        color: var(--text);
      }

      .face-preview {
        width: min(360px, 100%);
        padding: 14px;
        border: 1px solid rgba(80, 49, 36, 0.22);
        border-radius: 20px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .face-preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .face-preview-title {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .face-preview-status {
        font-size: 0.75rem;
        color: var(--muted);
        text-align: right;
      }

      .face-preview-stage {
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 14px;
        background: rgba(114, 80, 66, 0.16);
      }

      .face-preview-stage video,
      .face-preview-stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .face-preview-stage canvas {
        pointer-events: none;
      }

      .face-preview-controls {
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }

      .subtitle-panel {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(115, 81, 67, 0.18);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.45);
      }

      .side-note {
        margin-top: 10px;
        padding: 8px 10px;
        border: 1px solid rgba(115, 81, 67, 0.16);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.35);
      }

      .subtitle-label {
        display: block;
        margin-bottom: 4px;
        font-size: 0.64rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #9a6d5c;
      }

      .subtitle-value {
        min-height: 1.4em;
        font-size: 0.82rem;
        line-height: 1.45;
        color: var(--text);
      }

      .subtitle-value + .subtitle-label {
        margin-top: 10px;
      }

      .side-note .subtitle-value {
        color: var(--muted);
      }

      .chat-button {
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        background: var(--accent);
        color: #fff8f2;
        font: inherit;
        font-size: 0.92rem;
        cursor: pointer;
        transition: background 160ms ease, transform 160ms ease, opacity 160ms ease;
      }

      .chat-button:hover:not(:disabled) {
        background: var(--accent-deep);
        transform: translateY(-1px);
      }

      .chat-button:disabled {
        opacity: 0.65;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <aside class="face-preview">
      <div class="face-preview-header">
        <div class="face-preview-title">Face Chat</div>
        <div class="face-preview-status" id="face-status">Loading model...</div>
      </div>

      <div class="face-preview-stage">
        <video id="face-webcam" autoplay playsinline muted></video>
        <canvas id="face-canvas"></canvas>
      </div>

      <div class="face-preview-controls">
        <button class="chat-button" id="chat-toggle" type="button" disabled>
          Loading...
        </button>
      </div>

      <div class="subtitle-panel">
        <span class="subtitle-label">You</span>
        <div class="subtitle-value" id="user-subtitle">...</div>
        <span class="subtitle-label">Assistant</span>
        <div class="subtitle-value" id="assistant-subtitle">...</div>
      </div>

      <div class="side-note">
        <span class="subtitle-label">Mood On Side</span>
        <div class="subtitle-value" id="mood-side">neutral</div>
      </div>
    </aside>

    <script type="module">
      import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        get,
      } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

      const { FaceLandmarker, FilesetResolver, DrawingUtils } = vision;

      const GROQ_API_KEY = "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";
      const GROQ_MODEL = "llama-3.1-8b-instant";
      const firebaseConfig = {
        apiKey: "AIzaSyDScHB2VfJUKKxQzJGvnzy5lbrC5-pD3-c",
        authDomain: "second-project-c0837.firebaseapp.com",
        databaseURL: "https://second-project-c0837-default-rtdb.firebaseio.com",
        projectId: "second-project-c0837",
        storageBucket: "second-project-c0837.firebasestorage.app",
        messagingSenderId: "1047040535403",
        appId: "1:1047040535403:web:5707bfaf3a4d8869da3a2e",
      };
      const MODEL_ASSET_PATH =
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";
      const WASM_PATH =
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm";
      const KOKORO_MODEL_ID = "onnx-community/Kokoro-82M-v1.0-ONNX";
      const KOKORO_VOICE = "af_heart";
      const KOKORO_SPEED = 1;
      const SpeechRecognitionCtor =
        window.SpeechRecognition || window.webkitSpeechRecognition || null;

      const statusEl = document.getElementById("face-status");
      const toggleButton = document.getElementById("chat-toggle");
      const userSubtitleEl = document.getElementById("user-subtitle");
      const assistantSubtitleEl = document.getElementById("assistant-subtitle");
      const moodSideEl = document.getElementById("mood-side");
      const video = document.getElementById("face-webcam");
      const canvas = document.getElementById("face-canvas");
      const ctx = canvas.getContext("2d");
      const drawingUtils = new DrawingUtils(ctx);
      const firebaseApp = initializeApp(firebaseConfig);
      const database = getDatabase(firebaseApp);

      let faceLandmarker = null;
      let webcamRunning = false;
      let chatRunning = false;
      let mediaStream = null;
      let recognition = null;
      let recognitionActive = false;
      let waitingForGroq = false;
      let assistantSpeaking = false;
      let restartingRecognition = false;
      let animationFrameId = null;
      let lastVideoTime = -1;
      let latestResults = null;
      let firebaseInformationCache = [];
      let firebaseInformationLoadedAt = 0;
      let kokoroTts = null;
      let kokoroLoadPromise = null;
      let currentAudioElement = null;
      let currentAudioUrl = null;
      let latestFaceSummary = {
        emotion: "neutral",
        expression: "resting expression",
        tags: ["resting expression"],
        strongestSignal: "none",
      };

      function clamp(value, min = 0, max = 1) {
        return Math.min(max, Math.max(min, value));
      }

      function averageScore(scores, keys) {
        if (!keys.length) {
          return 0;
        }

        const total = keys.reduce((sum, key) => sum + (scores[key] || 0), 0);
        return total / keys.length;
      }

      function formatBlendshapeName(name) {
        return name
          .replace(/([A-Z])/g, " $1")
          .replace(/^./, (char) => char.toUpperCase());
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function updateSubtitle(element, text, fallback = "...") {
        element.textContent = text && text.trim() ? text.trim() : fallback;
      }

      function updateMoodSide() {
        moodSideEl.textContent = `${latestFaceSummary.emotion} | ${latestFaceSummary.expression}`;
      }

      function stopCurrentAudioPlayback() {
        if (currentAudioElement) {
          try {
            currentAudioElement.pause();
            currentAudioElement.src = "";
          } catch (error) {
          }
          currentAudioElement = null;
        }

        if (currentAudioUrl) {
          URL.revokeObjectURL(currentAudioUrl);
          currentAudioUrl = null;
        }
      }

      async function ensureKokoroReady() {
        if (kokoroTts) {
          return kokoroTts;
        }

        if (!kokoroLoadPromise) {
          kokoroLoadPromise = import("https://cdn.jsdelivr.net/npm/kokoro-js@1.2.1/+esm")
            .then(async (module) => {
              kokoroTts = await module.KokoroTTS.from_pretrained(KOKORO_MODEL_ID, {
                device: navigator.gpu ? "webgpu" : "wasm",
                dtype: "q4",
              });
              return kokoroTts;
            })
            .catch((error) => {
              kokoroTts = null;
              throw error;
            })
            .finally(() => {
              kokoroLoadPromise = null;
            });
        }

        return kokoroLoadPromise;
      }

      async function playKokoroSpeech(text) {
        const tts = await ensureKokoroReady();
        const audio = await tts.generate(text, {
          voice: KOKORO_VOICE,
          speed: KOKORO_SPEED,
        });

        return new Promise((resolve, reject) => {
          const blob = audio.toBlob();
          const url = URL.createObjectURL(blob);
          const player = new Audio(url);
          currentAudioElement = player;
          currentAudioUrl = url;

          const cleanup = () => {
            if (currentAudioElement === player) {
              currentAudioElement = null;
            }
            if (currentAudioUrl === url) {
              currentAudioUrl = null;
            }
            URL.revokeObjectURL(url);
          };

          player.addEventListener(
            "ended",
            () => {
              cleanup();
              resolve();
            },
            { once: true }
          );
          player.addEventListener(
            "error",
            () => {
              cleanup();
              reject(new Error("Kokoro playback failed"));
            },
            { once: true }
          );

          player.play().catch((error) => {
            cleanup();
            reject(error);
          });
        });
      }

      function collectInformationNodes(value, path = "root", matches = []) {
        if (value === null || value === undefined) {
          return matches;
        }

        if (typeof value !== "object") {
          return matches;
        }

        if (Array.isArray(value)) {
          value.forEach((item, index) => {
            collectInformationNodes(item, `${path}[${index}]`, matches);
          });
          return matches;
        }

        Object.entries(value).forEach(([key, childValue]) => {
          const childPath = `${path}.${key}`;
          if (key.toLowerCase().includes("information")) {
            matches.push({
              path: childPath,
              value: childValue,
            });
          }

          collectInformationNodes(childValue, childPath, matches);
        });

        return matches;
      }

      async function getFirebaseInformationContext() {
        const now = Date.now();
        if (firebaseInformationCache.length && now - firebaseInformationLoadedAt < 30000) {
          return firebaseInformationCache;
        }

        try {
          const snapshot = await get(ref(database));
          const data = snapshot.val();
          firebaseInformationCache = collectInformationNodes(data).slice(0, 12);
          firebaseInformationLoadedAt = now;
          return firebaseInformationCache;
        } catch (error) {
          console.error(error);
          return firebaseInformationCache;
        }
      }

      function restartRecognitionIfNeeded() {
        if (
          !chatRunning ||
          waitingForGroq ||
          assistantSpeaking ||
          !recognition ||
          recognitionActive ||
          restartingRecognition
        ) {
          return;
        }

        restartingRecognition = true;
        try {
          recognition.start();
        } catch (error) {
        } finally {
          restartingRecognition = false;
        }
      }

      function updateButton() {
        if (!faceLandmarker) {
          toggleButton.textContent = "Loading...";
          toggleButton.disabled = true;
          return;
        }

        toggleButton.disabled = false;

        if (waitingForGroq) {
          toggleButton.textContent = "Thinking...";
          return;
        }

        if (assistantSpeaking) {
          toggleButton.textContent = "Speaking...";
          return;
        }

        toggleButton.textContent = chatRunning ? "Stop Chat" : "Start Chat";
      }

      function resizeCanvas() {
        if (!video.videoWidth || !video.videoHeight) {
          return;
        }

        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
      }

      function scoreMapFromResults(faceBlendshapes) {
        const categories = faceBlendshapes?.[0]?.categories || [];
        return categories.reduce((accumulator, category) => {
          accumulator[category.categoryName] = category.score;
          return accumulator;
        }, {});
      }

      function topBlendshape(faceBlendshapes) {
        const categories = faceBlendshapes?.[0]?.categories || [];
        if (!categories.length) {
          return null;
        }

        return categories.slice().sort((a, b) => b.score - a.score)[0];
      }

      function analyzeFace(faceBlendshapes) {
        const scores = scoreMapFromResults(faceBlendshapes);
        const smile = averageScore(scores, ["mouthSmileLeft", "mouthSmileRight"]);
        const frown = averageScore(scores, ["mouthFrownLeft", "mouthFrownRight"]);
        const browRaise = averageScore(scores, [
          "browInnerUp",
          "browOuterUpLeft",
          "browOuterUpRight",
        ]);
        const browDown = averageScore(scores, ["browDownLeft", "browDownRight"]);
        const eyeWide = averageScore(scores, ["eyeWideLeft", "eyeWideRight"]);
        const eyeSquint = averageScore(scores, ["eyeSquintLeft", "eyeSquintRight"]);
        const jawOpen = scores.jawOpen || 0;
        const mouthPress = averageScore(scores, ["mouthPressLeft", "mouthPressRight"]);
        const mouthPucker = scores.mouthPucker || 0;
        const mouthStretch = averageScore(scores, ["mouthStretchLeft", "mouthStretchRight"]);
        const noseSneer = averageScore(scores, ["noseSneerLeft", "noseSneerRight"]);

        const candidates = [
          {
            label: "joy",
            score: clamp(smile * 0.75 - frown * 0.1),
          },
          {
            label: "surprise",
            score: clamp(jawOpen * 0.35 + eyeWide * 0.3 + browRaise * 0.25),
          },
          {
            label: "anger",
            score: clamp(browDown * 0.3 + mouthPress * 0.2 + noseSneer * 0.2 + frown * 0.15),
          },
          {
            label: "sadness",
            score: clamp(frown * 0.45 + browRaise * 0.25),
          },
          {
            label: "fear",
            score: clamp(eyeWide * 0.3 + mouthStretch * 0.25 + jawOpen * 0.2),
          },
          {
            label: "disgust",
            score: clamp(noseSneer * 0.4 + browDown * 0.2),
          },
        ];

        const best = candidates.reduce((strongest, candidate) =>
          candidate.score > strongest.score ? candidate : strongest
        );

        const tags = [];
        if (smile > 0.3) tags.push("smiling");
        if (frown > 0.22) tags.push("frowning");
        if (browRaise > 0.24) tags.push("eyebrows raised");
        if (browDown > 0.24) tags.push("brows lowered");
        if (eyeWide > 0.22) tags.push("eyes widened");
        if (eyeSquint > 0.24) tags.push("eyes squinting");
        if (jawOpen > 0.2) tags.push("mouth open");
        if (mouthPucker > 0.2) tags.push("lips pursed");

        const strongestSignal = topBlendshape(faceBlendshapes);
        const expression = tags.length ? tags.join(", ") : "resting expression";

        return {
          emotion: best.score > 0.18 ? best.label : "neutral",
          expression,
          tags: tags.length ? tags : ["resting expression"],
          strongestSignal: strongestSignal
            ? `${formatBlendshapeName(strongestSignal.categoryName)} ${strongestSignal.score.toFixed(3)}`
            : "none",
        };
      }

      function drawFaceLandmarks(results) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!results?.faceLandmarks?.length) {
          return;
        }

        for (const landmarks of results.faceLandmarks) {
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_TESSELATION,
            { color: "#f5f5f580", lineWidth: 1 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_FACE_OVAL,
            { color: "#f8ebe4", lineWidth: 1.5 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
            { color: "#8be08f", lineWidth: 1.5 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
            { color: "#ff8f8f", lineWidth: 1.5 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS,
            { color: "#8be08f", lineWidth: 1.5 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS,
            { color: "#ff8f8f", lineWidth: 1.5 }
          );
          drawingUtils.drawConnectors(
            landmarks,
            FaceLandmarker.FACE_LANDMARKS_LIPS,
            { color: "#ffd8c7", lineWidth: 1.2 }
          );
        }
      }

      async function createFaceLandmarker() {
        try {
          const filesetResolver = await FilesetResolver.forVisionTasks(WASM_PATH);

          try {
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
              baseOptions: {
                modelAssetPath: MODEL_ASSET_PATH,
                delegate: "GPU",
              },
              outputFaceBlendshapes: true,
              runningMode: "VIDEO",
              numFaces: 1,
            });
          } catch (gpuError) {
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
              baseOptions: {
                modelAssetPath: MODEL_ASSET_PATH,
                delegate: "CPU",
              },
              outputFaceBlendshapes: true,
              runningMode: "VIDEO",
              numFaces: 1,
            });
          }

          updateStatus("Ready");
          updateButton();
        } catch (error) {
          console.error(error);
          updateStatus("Model failed");
        }
      }

      async function startWebcam() {
        if (webcamRunning) {
          return;
        }

        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 960 },
            height: { ideal: 720 },
          },
          audio: false,
        });

        video.srcObject = mediaStream;

        if (video.readyState < 2) {
          await new Promise((resolve) => {
            video.addEventListener("loadeddata", resolve, { once: true });
          });
        }

        await video.play();
        webcamRunning = true;
        animationFrameId = requestAnimationFrame(predictWebcam);
      }

      function stopWebcam() {
        webcamRunning = false;
        lastVideoTime = -1;
        latestResults = null;

        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        if (mediaStream) {
          mediaStream.getTracks().forEach((track) => track.stop());
          mediaStream = null;
        }

        video.srcObject = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function predictWebcam() {
        if (!webcamRunning || !faceLandmarker) {
          return;
        }

        resizeCanvas();

        if (lastVideoTime !== video.currentTime) {
          lastVideoTime = video.currentTime;
          latestResults = faceLandmarker.detectForVideo(video, performance.now());

          if (latestResults?.faceBlendshapes?.length) {
            latestFaceSummary = analyzeFace(latestResults.faceBlendshapes);
          } else {
            latestFaceSummary = {
              emotion: "unclear",
              expression: "no face detected",
              tags: ["no face detected"],
              strongestSignal: "none",
            };
          }

          updateMoodSide();
        }

        drawFaceLandmarks(latestResults);
        animationFrameId = requestAnimationFrame(predictWebcam);
      }

      function ensureRecognition() {
        if (!SpeechRecognitionCtor || recognition) {
          return;
        }

        recognition = new SpeechRecognitionCtor();
        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.addEventListener("start", () => {
          recognitionActive = true;
          updateStatus("Listening...");
        });

        recognition.addEventListener("end", () => {
          recognitionActive = false;
          restartRecognitionIfNeeded();
        });

        recognition.addEventListener("error", (event) => {
          recognitionActive = false;
          if (event.error === "not-allowed" || event.error === "service-not-allowed") {
            updateStatus("Mic blocked");
            chatRunning = false;
            updateButton();
          }
        });

        recognition.addEventListener("result", async (event) => {
          let interimTranscript = "";
          let finalTranscript = "";

          for (const result of event.results) {
            const text = result[0]?.transcript || "";
            if (result.isFinal) {
              finalTranscript += `${text} `;
            } else {
              interimTranscript += `${text} `;
            }
          }

          updateSubtitle(userSubtitleEl, finalTranscript || interimTranscript);

          const transcript = finalTranscript.trim();

          if (!transcript || waitingForGroq) {
            return;
          }

          waitingForGroq = true;
          updateStatus("Thinking...");
          updateButton();

          try {
            const reply = await sendToGroq(transcript);
            waitingForGroq = false;
            updateSubtitle(assistantSubtitleEl, reply);
            await speakReply(reply);
          } catch (error) {
            console.error(error);
            updateStatus("Groq error");
            updateSubtitle(assistantSubtitleEl, "I hit an error.");
          } finally {
            waitingForGroq = false;
            if (chatRunning && !assistantSpeaking) {
              updateStatus("Listening...");
            }
            updateButton();
            restartRecognitionIfNeeded();
          }
        });
      }

      async function sendToGroq(userText) {
        const firebaseInformation = await getFirebaseInformationContext();
        const visualContext = {
          mood_hint: latestFaceSummary.emotion,
          expression_hint: latestFaceSummary.expression,
          facial_cues: latestFaceSummary.tags.join(", "),
          strongest_signal: latestFaceSummary.strongestSignal,
          firebase_information: firebaseInformation,
        };

        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${GROQ_API_KEY}`,
          },
          body: JSON.stringify({
            model: GROQ_MODEL,
            temperature: 0.6,
            max_tokens: 220,
            messages: [
              {
                role: "system",
                content:
                  "You are a warm emotional-support companion with a calm, therapist-like tone. Be gentle, grounding, reassuring, and reflective. Focus on helping the user feel heard. Keep replies conversational and fairly brief. Do not mention camera input, facial expressions, emotions you detected, visual analysis, or hidden context unless the user directly asks about it. Use the hidden context only to softly adjust tone and empathy.",
              },
              {
                role: "user",
                content: `User speech: ${userText}\nHidden support context: ${JSON.stringify(
                  visualContext
                )}`,
              },
            ],
          }),
        });

        if (!response.ok) {
          throw new Error(`Groq request failed with ${response.status}`);
        }

        const data = await response.json();
        return (
          data?.choices?.[0]?.message?.content?.trim() ||
          "I heard you, but I don't have a response right now."
        );
      }

      function speakReply(text) {
        if (!text) {
          return Promise.resolve();
        }

        if (recognition && recognitionActive) {
          try {
            recognition.stop();
          } catch (error) {
          }
        }

        assistantSpeaking = true;
        updateStatus("Speaking...");
        updateButton();

        return new Promise((resolve) => {
          let finished = false;
          const finish = () => {
            if (finished) {
              return;
            }
            finished = true;
            assistantSpeaking = false;
            if (chatRunning && !waitingForGroq) {
              updateStatus("Listening...");
            }
            updateButton();
            restartRecognitionIfNeeded();
            resolve();
          };

          const speakWithBrowserVoice = () => {
            if (!("speechSynthesis" in window)) {
              finish();
              return;
            }

            stopCurrentAudioPlayback();
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";
            utterance.rate = 0.98;
            utterance.pitch = 1;
            utterance.addEventListener("end", finish, { once: true });
            utterance.addEventListener("error", finish, { once: true });

            try {
              window.speechSynthesis.speak(utterance);
            } catch (error) {
              finish();
            }
          };

          stopCurrentAudioPlayback();
          window.speechSynthesis?.cancel();

          playKokoroSpeech(text)
            .then(() => {
              finish();
            })
            .catch((error) => {
              console.error(error);
              speakWithBrowserVoice();
            });
        });
      }

      function stopChat() {
        chatRunning = false;
        waitingForGroq = false;
        assistantSpeaking = false;
        restartingRecognition = false;

        if (recognition && recognitionActive) {
          try {
            recognition.stop();
          } catch (error) {
          }
        }

        window.speechSynthesis?.cancel();
        stopCurrentAudioPlayback();
        stopWebcam();
        updateStatus("Ready");
        updateSubtitle(userSubtitleEl, "");
        updateSubtitle(assistantSubtitleEl, "");
        latestFaceSummary = {
          emotion: "neutral",
          expression: "resting expression",
          tags: ["resting expression"],
          strongestSignal: "none",
        };
        updateMoodSide();
        updateButton();
      }

      async function startChat() {
        if (!faceLandmarker) {
          return;
        }

        if (!SpeechRecognitionCtor) {
          updateStatus("Mic unsupported");
          return;
        }

        await startWebcam();
        ensureRecognition();

        chatRunning = true;
        updateButton();

        if (recognition && !recognitionActive) {
          restartRecognitionIfNeeded();
        }
      }

      async function toggleChat() {
        if (chatRunning) {
          stopChat();
          return;
        }

        try {
          await startChat();
        } catch (error) {
          console.error(error);
          updateStatus("Camera or mic blocked");
          chatRunning = false;
          updateButton();
        }
      }

      toggleButton.addEventListener("click", toggleChat);
      window.addEventListener("beforeunload", stopChat);

      updateMoodSide();
      createFaceLandmarker();
      window.setTimeout(() => {
        ensureKokoroReady().catch(() => {});
      }, 1200);
    </script>
  </body>
</html>
